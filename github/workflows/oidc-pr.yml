name: oidc-pr
on: pull_request
permissions:
  id-token: write
  contents: read
jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Request and decode OIDC token
        run: |
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "NO OIDC ENDPOINT — id-token:write not granted to this fork PR (EXPECTED secure default)"; exit 0
          fi
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=test" | jq -r '.value')
          echo "::group::decoded claims"
          echo "$TOKEN" | python3 -c "import sys,base64,json; p=sys.stdin.read().strip().split('.')[1]; p+='='*(-len(p)%4); print(json.dumps(json.loads(base64.urlsafe_b64decode(p)),indent=2))"
          echo "::endgroup::"
